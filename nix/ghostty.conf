# Ghostty Terminal Configuration
# https://ghostty.org/docs/config
#
# Ghostty looks for this config at ~/.config/ghostty/config
# Linked via nix home-manager (see home.nix)

# =============================================================================
# Font
# =============================================================================

# Using the same Monaco Nerd Font as iTerm2/tmux setup
font-family = "Monaco Nerd Font Complete Mono"
font-size = 12

# Disable font thicken on macOS (crisper rendering on retina displays)
# font-thicken = true

# Font rendering - enable font features if desired
# font-feature = -liga
# font-feature = -calt

# =============================================================================
# Window / Chrome
# =============================================================================

# Start maximized like iTerm2 was configured (Window Type 12)
window-decoration = true
macos-titlebar-style = transparent

# No window padding (tight like terminal should be)
window-padding-x = 2
window-padding-y = 2

# Window theme follows system dark/light mode
window-theme = auto

# Confirm before closing if processes are running
confirm-close-surface = true

# Background opacity (1.0 = fully opaque, matching iTerm2's Transparency = 0)
background-opacity = 1.0

# Blur (disabled - matching iTerm2's Blur = 0)
# background-blur-radius = 0

# =============================================================================
# Colors
# =============================================================================

# Dark background matching iTerm2 dark mode (~#1f1f1f)
background = #1e1e1e
foreground = #dcdcdc

# Cursor
cursor-color = #f0c674
# cursor-style = block
# cursor-style-blink = false

# Selection
selection-background = #444444
selection-foreground = #ffffff

# ANSI Colors (matched from iTerm2 plist)
# Black
palette = 0=#141916
# Red
palette = 1=#b43c3c
# Green
palette = 2=#73c48f
# Yellow
palette = 3=#ece100
# Blue
palette = 4=#a7abb5f2
# Magenta
palette = 5=#e1e17e
# Cyan
palette = 6=#60feff
# White
palette = 7=#f4f4f4

# Bright Black
palette = 8=#555555
# Bright Red
palette = 9=#b43c3c
# Bright Green
palette = 10=#58e790
# Bright Yellow
palette = 11=#ece100
# Bright Blue
palette = 12=#a7abf2
# Bright Magenta
palette = 13=#e17ee1
# Bright Cyan
palette = 14=#60feff
# Bright White
palette = 15=#ffffff

# =============================================================================
# Keyboard / Input
# =============================================================================

# Option key sends Esc+ (like iTerm2's "Option Key Sends: Esc+")
# This is critical for vi-mode and tmux key bindings to work properly
macos-option-as-alt = true

# =============================================================================
# Mouse
# =============================================================================

mouse-hide-while-typing = true

# Copy on select (like typical terminal behavior)
copy-on-select = clipboard

# Clicking URLs opens them
link-url = true

# NOTE: Hold Shift to select text bypassing tmux mouse capture.
# (In iTerm2 this was Option, but Option is used as Alt here for vi/tmux bindings)

# =============================================================================
# Scrollback
# =============================================================================

# Match iTerm2's scrollback (1000 lines). Increase if needed.
scrollback-limit = 10000

# =============================================================================
# Bell
# =============================================================================

# Visual bell only (matching iTerm2's Visual Bell = 1, Flashing Bell = 0)
# Ghostty doesn't flash; it can show a visual indicator or do nothing.
# "none" disables the audible bell entirely.
# bell-on-output = false

# =============================================================================
# Shell / Integration
# =============================================================================

# Ghostty will use your default shell (zsh via home-manager)
# shell-integration = zsh

# =============================================================================
# Performance
# =============================================================================

# Use Metal renderer on macOS for best performance
# (this is the default, noted here for documentation)

# =============================================================================
# Keybindings
# =============================================================================

# Reload config
keybind = super+shift+comma=reload_config

# Split panes (similar to iTerm2 defaults)
keybind = super+d=new_split:right
keybind = super+shift+d=new_split:down

# Navigate splits
keybind = super+alt+left=goto_split:left
keybind = super+alt+right=goto_split:right
keybind = super+alt+up=goto_split:top
keybind = super+alt+down=goto_split:bottom

# Tabs
keybind = super+t=new_tab
keybind = super+w=close_surface

# Font size
keybind = super+equal=increase_font_size:1
keybind = super+minus=decrease_font_size:1
keybind = super+zero=reset_font_size

# =============================================================================
# Potentially useful options (commented out)
# =============================================================================

# Fullscreen on startup
# fullscreen = true

# Custom working directory for new windows/tabs
# working-directory = home

# Disable ligatures if your font has them and you don't want them
# font-feature = -liga

# Minimum contrast ratio for text (1.0-21.0, higher = more contrast)
# minimum-contrast = 1.0

# Adjust cell spacing if text feels cramped or too spread out
# adjust-cell-height = 0%

# Clipboard read/write access for OSC 52 (needed for tmux copy-paste)
clipboard-read = allow
clipboard-write = allow

# Quick terminal (drop-down terminal like iTerm2's hotkey window)
# keybind = global:ctrl+grave_accent=toggle_quick_terminal

# Custom shader effects (for fun)
# custom-shader = crt.glsl

# macOS-specific: non-native fullscreen for multi-monitor setups
macos-non-native-fullscreen = true

# Window size in cells (columns x rows) - override if you don't want maximized
# window-height = 50
# window-width = 160
